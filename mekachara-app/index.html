<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>UNIT HANGAR</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script src="firebase-config.js"></script>

<style>
body {
  margin: 0;
  padding: 24px;
  font-family: Arial, sans-serif;
  color: #e8edf2;
  background: linear-gradient(180deg, #15181d, #101318);
}

.shell {
  max-width: 1240px;
  margin: 0 auto;
}

.header {
  margin-bottom: 20px;
  padding: 18px 20px;
  border: 1px solid #2c323a;
  background: linear-gradient(180deg, #1b2027, #14181e);
}

.header-top {
  font-size: 10px;
  color: #7f8b97;
  letter-spacing: 0.18em;
  margin-bottom: 8px;
  text-transform: uppercase;
}

.header-title {
  margin: 0;
  color: #f5f7f9;
  font-size: 24px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

.create-box {
  margin-bottom: 24px;
  padding: 18px;
  border: 1px solid #2c323a;
  background: linear-gradient(180deg, #1b2027, #14181e);
}

.section-label {
  margin-bottom: 14px;
  color: #b8c2cc;
  font-size: 11px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
}

.form-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr auto;
  gap: 12px;
  align-items: end;
}

@media (max-width: 900px) {
  .form-grid {
    grid-template-columns: 1fr;
  }
}

.input-wrap {
  display: flex;
  flex-direction: column;
}

.input-wrap label {
  font-size: 10px;
  color: #8e99a4;
  margin-bottom: 5px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
}

input {
  width: 100%;
  padding: 12px 13px;
  box-sizing: border-box;
  background: #0f1318;
  border: 1px solid #2e353d;
  color: #eef2f5;
  outline: none;
}

input:focus {
  border-color: #5e768d;
  background: #11161c;
}

input::placeholder {
  color: #6f7a86;
}

button {
  padding: 12px 18px;
  border: 1px solid #3c4a57;
  background: #1d2630;
  color: #f2f5f7;
  cursor: pointer;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  min-height: 46px;
}

button:hover {
  background: #222d38;
  border-color: #5a7084;
}

.list-label {
  margin: 0 0 14px;
  color: #b8c2cc;
  font-size: 11px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
}

#list {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 18px;
}

.card {
  border: 1px solid #2c323a;
  background: linear-gradient(180deg, #1a1f26, #12161c);
  overflow: hidden;
  transition: transform 0.18s, border-color 0.18s;
}

.card:hover {
  transform: translateY(-3px);
  border-color: #4b5d6d;
}

.card a {
  text-decoration: none;
  color: inherit;
  display: block;
}

.imgWrap {
  position: relative;
  width: 100%;
  height: 220px;
  background: #0d1014;
  overflow: hidden;
  border-bottom: 1px solid #2c323a;
}

.imgWrap::before {
  content: "MAIN VISUAL";
  position: absolute;
  left: 10px;
  top: 10px;
  z-index: 3;
  font-size: 9px;
  letter-spacing: 0.14em;
  color: rgba(255,255,255,0.72);
  background: rgba(0,0,0,0.35);
  padding: 2px 6px;
  text-transform: uppercase;
}

.mecha-img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

.no-image {
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #7e8893;
  font-size: 12px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
}

.pilot {
  position: absolute;
  right: 12px;
  bottom: 12px;
  width: 68px;
  height: 68px;
  object-fit: cover;
  border: 1px solid rgba(255,255,255,0.7);
  background: #000;
  z-index: 2;
}

.pilot-label {
  position: absolute;
  right: 12px;
  bottom: 84px;
  z-index: 2;
  font-size: 9px;
  color: rgba(255,255,255,0.78);
  letter-spacing: 0.12em;
  background: rgba(0,0,0,0.45);
  padding: 2px 6px;
  text-transform: uppercase;
}

.info {
  padding: 14px;
}

.card-id {
  font-size: 10px;
  color: #7f8b97;
  letter-spacing: 0.16em;
  margin-bottom: 8px;
  text-transform: uppercase;
}

.mecha {
  font-weight: 600;
  font-size: 18px;
  margin-bottom: 7px;
  color: #f5f7f9;
}

.meta {
  font-size: 12px;
  color: #a5afb8;
  margin-bottom: 4px;
  letter-spacing: 0.04em;
}

.empty {
  padding: 28px;
  border: 1px dashed #39414a;
  color: #7f8b97;
  letter-spacing: 0.1em;
  text-align: center;
  text-transform: uppercase;
}
</style>
</head>

<body>
<div class="shell">
  <div class="header">
    <div class="header-top">Unit Profile Management System</div>
    <h1 class="header-title">Unit Hangar</h1>
  </div>

  <div class="create-box">
    <div class="section-label">New Unit Registration</div>
    <div class="form-grid">
      <div class="input-wrap">
        <label for="mechaName">Machine Name</label>
        <input id="mechaName" placeholder="機体名">
      </div>

      <div class="input-wrap">
        <label for="pilotName">Pilot Name</label>
        <input id="pilotName" placeholder="パイロット">
      </div>

      <div class="input-wrap">
        <label for="creator">Maker</label>
        <input id="creator" placeholder="製作者">
      </div>

      <div>
        <button onclick="add()">Create Unit</button>
      </div>
    </div>
  </div>

  <div class="list-label">Registered Units</div>
  <div id="list"></div>
</div>

<script>
function add() {
  const mecha = document.getElementById("mechaName").value.trim();
  const pilot = document.getElementById("pilotName").value.trim();
  const creator = document.getElementById("creator").value.trim();

  if (!mecha) {
    alert("機体名を入力してください");
    return;
  }

  db.collection("characters").add({
    mechaName: mecha,
    pilotName: pilot,
    creator: creator,
    mechaImageUrl: "",
    pilotImageUrl: ""
  }).then(doc => {
    location.href = "detail.html?id=" + doc.id;
  }).catch(error => {
    alert("作成エラー: " + error.message);
  });
}

function createCardImage(d) {
  if (!d.mechaImageUrl) {
    return `
      <div class="imgWrap">
        <div class="no-image">No Machine Image</div>
      </div>
    `;
  }

  return `
    <div class="imgWrap">
      <img class="mecha-img" src="${d.mechaImageUrl}" alt="機体画像"
           onerror="this.style.display='none'; this.parentElement.innerHTML='<div class=&quot;no-image&quot;>Image Error</div>';">
      ${d.pilotImageUrl ? `
        <div class="pilot-label">Pilot</div>
        <img class="pilot" src="${d.pilotImageUrl}" alt="パイロット画像">
      ` : ""}
    </div>
  `;
}

db.collection("characters").onSnapshot(snap => {
  const list = document.getElementById("list");
  list.innerHTML = "";

  if (snap.empty) {
    list.innerHTML = `<div class="empty">No Registered Units</div>`;
    return;
  }

  let index = 1;

  snap.forEach(doc => {
    const d = doc.data();
    const el = document.createElement("div");
    el.className = "card";

    const unitId = "UNIT-" + String(index).padStart(3, "0");
    index++;

    el.innerHTML = `
      <a href="detail.html?id=${doc.id}">
        ${createCardImage(d)}
        <div class="info">
          <div class="card-id">${unitId}</div>
          <div class="mecha">${d.mechaName || "未設定"}</div>
          <div class="meta">Pilot: ${d.pilotName || ""}</div>
          <div class="meta">Maker: ${d.creator || ""}</div>
        </div>
      </a>
    `;

    list.appendChild(el);
  });
});
</script>
</body>
</html>
